            border-radius: 32px;
            box-shadow: 0 20px 35px var(--shadow-color);
            border: 2px solid var(--card-border);
            position: relative;
            transition: all 0.3s ease;
            overflow: visible;

            background: var(--btn-bg); border: none; padding: 8px 18px; border-radius: 60px;

            cursor: pointer; transition: 0.2s ease;
        }
        button:hover { background: var(--btn-hover); transform: translateY(-1px); }
        button:active { transform: translateY(1px); }
        
        .mode-switch {
            margin-left: auto; background: rgba(0,0,0,0.1);
            display: flex; gap: 6px; padding: 4px 8px; border-radius: 60px;
        }
        .mode-btn { background: transparent; padding: 6px 14px; border-radius: 40px; color: var(--text-muted); }
        .mode-btn.active { background: var(--accent); color: white; }

        .settings-label { color: var(--text-muted); font-size: 0.75rem; }
        .addr-tag { font-size: 0.7rem; color: var(--text-muted); }

</head>

    function isPurePopGadget(name) {
        if (!name) return false;
        return /^pop\s+[a-z0-9]+$/i.test(name.trim());
    }

    function getPopSizes(gadgetName) {
        if (!gadgetName) return null;
        let pops = [];
        let regex = /pop\s+([^,]+(?:,[^,]+)*)/gi;
        let match;
        while ((match = regex.exec(gadgetName)) !== null) {
            let popPart = match[1];
            let tokens = popPart.split(',');
            for (let token of tokens) {
                token = token.trim();
                if (token === '' || token === 'rt' || token === 'pop' || token === 'sp') continue;
                if (token === 'ea') pops.push(2);
                else if (token === 'pc') pops.push(2);
                else if (token === 'psw') pops.push(1);
                else if (token.startsWith('qr')) { for (let i = 0; i < 4; i++) pops.push(2); }
                else if (token.startsWith('xr')) { for (let i = 0; i < 2; i++) pops.push(2); }
                else if (token.startsWith('er')) pops.push(2);
                else if (token.startsWith('r')) pops.push(1);
            }
        }
        return pops.length ? pops : null;
    }

    function getPopBytesCount(name) {
        let sizes = getPopSizes(name);
        if (!sizes) return 0;
        return sizes.reduce((a, b) => a + b, 0);
    }

    function getPopRegisters(name) {
        let regs = [];
        let regex = /pop\s+([a-z0-9]+)/gi;
        let match;
        while ((match = regex.exec(name)) !== null) { regs.push(match[1]); }
        return regs;
    }

        for (let i = 0; i < clean.length; i += 2) bytes.push(parseInt(clean.substr(i,2),16));

    function formatAsToken(bytes) {
        let parts = [];
        let inCalc = false;
        let currentCalc = "";
        for (let b of bytes) {
            if (hexToToken[b]) {
                if (!inCalc) { inCalc = true; currentCalc = ""; }
                currentCalc += hexToToken[b];
            } else {
                if (inCalc) { parts.push(`calc "${currentCalc}"`); inCalc = false; }
                parts.push(`0x${b.toString(16).padStart(2,'0')}`);
            }
        }
        if (inCalc) parts.push(`calc "${currentCalc}"`);
        return parts.join("\n");
    }

    function parseToItems(bytes, startAddrDest, startAddrSrc) {
        let items = [];
        let offset = 0;
        let i = 0;
        while (i < bytes.length) {
            let ramAddrDest = startAddrDest + offset;
            let ramAddrSrc = startAddrSrc + offset;
            if (i + 3 < bytes.length) {
                let zz = bytes[i], yy = bytes[i+1], third = bytes[i+2], fourth = bytes[i+3];
                if (third >= 0x30 && third <= 0x39 && fourth === 0x30) {
                    let X = third - 0x30;
                    let rawAddr = (X << 16) | (yy << 8) | zz;
                    if (rawAddr === 0x03030) {
                        items.push({ type: 'data', hexBytes: [zz], value: zz, ramAddrDest, ramAddrSrc, viewMode: 'auto' });
                        offset++;
                        items.push({ type: 'data', hexBytes: [yy], value: yy, ramAddrDest: startAddrDest+offset, ramAddrSrc: startAddrSrc+offset, viewMode: 'auto' });
                        i += 2; offset++;
                        continue;
                    }
                    if (rawAddr < MIN_VALID_CALL_ADDR) {
                        for (let b of [zz, yy, third, fourth]) {
                            items.push({ type: 'data', hexBytes: [b], value: b, ramAddrDest: startAddrDest+offset, ramAddrSrc: startAddrSrc+offset, viewMode: 'auto' });
                            offset++;
                        }
                        i += 4;
                        continue;
                    }
                    let fixedAddr = normalizeAddress(rawAddr);
                    let name = addrToName.get(fixedAddr);
                    items.push({
                        type: 'call',
                        hexBytes: [zz, yy, third, fourth],
                        addr: fixedAddr,
                        name: name || null,
                        popGrouped: autoGroupPop && isPurePopGadget(name),
                        ramAddrDest,
                        ramAddrSrc
                    });
                    i += 4;
                    offset += 4;
                    
                    if (autoPopData && name && !specialNoPopGadgets.has(name)) {
                        let popSizes = getPopSizes(name);
                        if (popSizes && popSizes.length > 0) {
                            let totalBytes = popSizes.reduce((a,b) => a+b, 0);
                            if (i + totalBytes <= bytes.length) {
                                for (let sz of popSizes) {
                                    for (let bi = 0; bi < sz; bi++) {
                                        const b = bytes[i];
                                        items.push({
                                            type: 'data',
                                            hexBytes: [b],
                                            value: b,
                                            ramAddrDest: startAddrDest + offset,
                                            ramAddrSrc: startAddrSrc + offset,
                                            viewMode: 'auto'
                                        });
                                        i++; offset++;
                                    }
                                }
                                continue;
                            }
                        }
                    }
                    continue;
                }
            }
            items.push({ type: 'data', hexBytes: [bytes[i]], value: bytes[i], ramAddrDest, ramAddrSrc, viewMode: 'auto' });
            i++; offset++;
        }
        return items;
    }

    function addLabelReferences(items) {
        let addrToItemIdx = new Map();
        for (let idx = 0; idx < items.length; idx++) {
            const it = items[idx];
            if (it.type === 'label') continue;
            let size = (it.type === 'call') ? 4 : (it.hexBytes ? it.hexBytes.length : 1);
            for (let b = 0; b < size; b++) {
                addrToItemIdx.set(it.ramAddrDest + b, { idx: idx, offset: b, isSrc: false });
                addrToItemIdx.set(it.ramAddrSrc + b, { idx: idx, offset: b, isSrc: true });
            }
        }

        let labelCounter = 1;
        let labelMap = new Map(); // baseAddr -> { name, insertBefore }

        for (let idx = 0; idx < items.length - 1; idx++) {
            const it0 = items[idx];
            const it1 = items[idx + 1];
            if (it0.type !== 'data' || it1.type !== 'data') continue;
            if (it0.hexBytes.length !== 1 || it1.hexBytes.length !== 1) continue;
            
            it0.labelRef = null;
            it1.labelSecond = false;
            
            if (!labelMode) continue;

            const val = (it1.value << 8) | it0.value;
            let target = addrToItemIdx.get(val);
            if (!target) continue;
            
            let isSrc = target.isSrc;
            let targetItem = items[target.idx];
            let size = targetItem.hexBytes ? targetItem.hexBytes.length : 1;
            if (targetItem.type === 'call') size = 4;

            let baseAddr;
            let insertBefore;
            let offsetFromLabel;

            if (target.offset === 0) {
                // Trỏ đúng đỉnh Gadget/Data
                baseAddr = targetItem.ramAddrDest;
                insertBefore = target.idx;
                offsetFromLabel = 0;
            } else {
                // Trỏ lệch giữa Gadget (ví dụ: nhảy tránh phần pop đầu)
                // Đẩy Label xuống sau Gadget, Offset sẽ mang số âm
                baseAddr = targetItem.ramAddrDest + size;
                insertBefore = target.idx + 1;
                offsetFromLabel = target.offset - size; 
            }

            if (!labelMap.has(baseAddr)) { 
                let customName = customLabels.get(baseAddr);
                labelMap.set(baseAddr, { name: customName || `label${labelCounter++}`, insertBefore }); 
            }
            
            const labelInfo = labelMap.get(baseAddr);
            it0.labelRef = { label: labelInfo.name, isSrc: isSrc, originalValue: val, additionalOffset: offsetFromLabel };
            it1.labelSecond = true; 
            idx++; 
        }

        if (labelMode) {
            let labelItems = [];
            for (let [addr, info] of labelMap.entries()) {
                if (info.insertBefore !== undefined) { 
                    labelItems.push({ type: 'label', label: info.name, insertBefore: info.insertBefore, addr: addr }); 
                }
            }
            labelItems.sort((a,b) => b.insertBefore - a.insertBefore);
            for (let li of labelItems) { items.splice(li.insertBefore, 0, { type: 'label', label: li.label, addr: li.addr }); }

            let merged = false;
            do {
                merged = false;
                for (let i = 0; i < items.length - 1; i++) {
                    if (items[i].type === 'label' && items[i+1].type === 'label') {
                        let keepLabel = items[i].label;
                        let removeLabel = items[i+1].label;
                        items.splice(i+1, 1);
                        for (let it of items) {
                            if (it.type === 'data' && it.labelRef && it.labelRef.label === removeLabel) {
                                it.labelRef.label = keepLabel;
                            }
                        }
                        merged = true; break;
                    }
                }
            } while (merged);
        }

        return items;
    }

    function resequenceLabels(items) {
        let oldToNew = new Map();
        let counter = 1;
        for (let it of items) {
            if (it.type === 'label' && !oldToNew.has(it.label)) {
                if (customLabels.has(it.addr) && customLabels.get(it.addr) === it.label) {
                    oldToNew.set(it.label, it.label);
                } else {
                    oldToNew.set(it.label, `label${counter++}`);
                }
            }
        }
        for (let it of items) {
            if (it.type === 'label') it.label = oldToNew.get(it.label) || it.label;
            if (it.type === 'data' && it.labelRef) {
                it.labelRef.label = oldToNew.get(it.labelRef.label) || it.labelRef.label;
            }
        }
        return items;
    }

    function saveHistory() {

            historyStack.push(JSON.parse(JSON.stringify(currentItems)));
            undoBtn.style.display = 'inline-block';
        } catch (e) {

        }
    }

    undoBtn.onclick = () => {
        if (historyStack.length > 0) {
            currentItems = historyStack.pop();

    function updateStats(bytes, items) { 
        document.getElementById('statsMsg').textContent = `byte: ${bytes} | items: ${items.length}`; 
    }

    function setStatus(text, isError = false) {
        const statusSpan = document.getElementById('statusMsg');

    function fmtAddr(n) { return '0x' + n.toString(16).toLowerCase(); }

    function buildHexStr(it) {
        const byteStr = it.hexBytes.map(b => b.toString(16).padStart(2,'0')).join(' ');
        if (hexMode === 'hex') return `hex ${byteStr}`;
        const reversed = [...it.hexBytes].reverse().map(b => b.toString(16).padStart(2,'0')).join('');
        return `0x${reversed.toUpperCase()}`;
    }

    function getDataDisplay(it) {
        if (it.viewMode === 'hex') return buildHexStr(it);

        if (labelMode && it.labelRef) {
            const ref = it.labelRef;
            let offset = ref.additionalOffset || 0;
            if (ref.isSrc) offset += (currentStartAddrSrc - currentStartAddrDest);

            let dynShift = window.currentLabelShifts[ref.label] || 0;
            offset += dynShift;

            let offsetStr = offset.toString();
            // Thêm dấu + cho các offset nhỏ gọn (như +6, +4), bỏ dấu + cho các offset lớn như 4784 để tối giản
            if (offset > 0 && offset < 1000) {
                offsetStr = '+' + offset;
            }

            if (offset === 0) return `adr_of ${ref.label}`;
            return `adr_of [${offsetStr}] ${ref.label}`;
        }

        if (translateNames && valueToName.has(it.value) && it.hexBytes.length === 2) {
            return valueToName.get(it.value);
        }

        return buildHexStr(it);
    }

    function convertCallToHex(callItem) {
        const idx = currentItems.indexOf(callItem);
        if (idx === -1) return;
        const newItems = [];
        for (let j = 0; j < 4; j++) {
            newItems.push({
                type: 'data',
                hexBytes: [callItem.hexBytes[j]],
                value: callItem.hexBytes[j],
                ramAddrDest: callItem.ramAddrDest + j,
                ramAddrSrc: callItem.ramAddrSrc + j,
                viewMode: 'auto'
            });
        }
        currentItems.splice(idx, 1, ...newItems);
        refreshOutput();
    }

    function canGroupPop(items, idx) {
        const it = items[idx];
        if (it.type !== 'call' || !isPurePopGadget(it.name) || !it.popGrouped) return false;
        let totalBytes = getPopBytesCount(it.name);
        if (totalBytes === 0) return false;
        let b = 0;
        for (let j = idx + 1; j < items.length; j++) {
            if (items[j].type === 'label') continue; 
            if (items[j].type === 'data') b += items[j].hexBytes.length;
            else return false;
            if (b >= totalBytes) return true;
        }
        return false;
    }

    function buildDisplayItems(items, isSubCall = false) {
        if (!isSubCall) {
            window.currentLabelShifts = {};
        }
        const disp = [];
        let i = 0;
        
        // Pass 1: Tính toán Shift ảo cho Label nếu nằm giữa POP
        while (i < items.length) {
            let it = items[i];
            if (it.type === 'call' && canGroupPop(items, i)) {
                let totalBytes = getPopBytesCount(it.name);
                let b = 0;
                let j = i + 1;
                while (j < items.length && b < totalBytes) {
                    if (items[j].type === 'label') {
                        // Tính toán độ dời lên phía trước POP Group (để bù trừ vào các adr_of)
                        window.currentLabelShifts[items[j].label] = items[j].addr - it.ramAddrDest;
                    } else if (items[j].type === 'data') {
                        b += items[j].hexBytes.length;
                    }
                    j++;
                }
            }
            i++;
        }

        // Pass 2: Trải phẳng Display List
        i = 0;
        while (i < items.length) {
            const it = items[i];
            
            if (it.type === 'label') {
                if (labelMode) disp.push({ kind: 'label', item: it, idx: i });
                i++;
                continue;
            }
            
            if (it.type === 'call') {
                if (canGroupPop(items, i)) {
                    let totalBytes = getPopBytesCount(it.name);
                    let regs = getPopRegisters(it.name);
                    let consumedItems = [];
                    let skippedLabels = [];
                    let j = i + 1;
                    let b = 0;
                    while (j < items.length && b < totalBytes) {
                        if (items[j].type === 'data') {
                            consumedItems.push(items[j]);
                            b += items[j].hexBytes.length;
                        } else if (items[j].type === 'label') {
                            skippedLabels.push(items[j]);
                        }
                        j++;
                    }

                    // Render các Label bị dời trước Pop Group
                    if (labelMode) {
                        for (let lbl of skippedLabels) {
                            disp.push({ kind: 'label', item: lbl, idx: -1 });
                        }
                    }

                    disp.push({ kind: 'popgroup', item: it, consumedItems, regs, idx: i });
                    i = j; 
                    continue;
                } else {
                    disp.push({ kind: 'call', item: it, idx: i });
                    i++;
                    continue;
                }
            }
            
            if (it.labelRef) {
                if (labelMode) {
                    disp.push({ kind: 'labelref', item: it, item2: items[i+1], idx: i });
                    i += 2;
                    continue;
                } else {
                    disp.push({ kind: 'data2', item: it, item2: items[i+1], idx: i });
                    i += 2;
                    continue;
                }
            }
            
            if (it.labelSecond) { i++; continue; }
            
            const next = items[i + 1];
            if (next && next.type === 'data' && !next.labelSecond && !next.labelRef) {
                disp.push({ kind: 'data2', item: it, item2: next, idx: i });
                i += 2;
            } else {
                disp.push({ kind: 'data1', item: it, idx: i });
                i++;
            }
        }
        return disp;
    }

    function isLabelDataOnly(items, labelIdx) {
        if (labelIdx === -1) return false;
        let i = labelIdx + 1;
        while (i < items.length) {
            if (items[i].type === 'label') break; 
            if (items[i].type === 'call') return false;
            i++;
        }
        return true;
    }

    function formatPopGroupAssignment(regs, consumedItems) {
        let subDisp = buildDisplayItems(consumedItems, true);
        let valuesStr = subDisp.map(d => {
            let it;
            if (d.kind === 'labelref') return getDataDisplay(d.item).split('#')[0].trim();
            if (d.kind === 'data2') {
                it = { hexBytes: [...d.item.hexBytes, ...d.item2.hexBytes], value: (d.item2.value << 8) | d.item.value, labelRef: null, viewMode: d.item.viewMode };
            } else {
                it = d.item;
            }
            return getDataDisplay(it);
        }).join(', ');
        
        return `${regs.join(', ')} = ${valuesStr}`;
    }

    const collapsedLabels = new Set();
    const collapsedViewMode = {}; 

    function makeCollapseBtn(labelName, container, labelLineDiv) {
        const btn = document.createElement('button');
        btn.className = 'toggle-call-btn';
        btn.style.background = 'transparent';
        btn.style.border = 'none';
        btn.style.color = 'var(--text-muted)';
        btn.style.cursor = 'pointer';
        btn.style.fontSize = '10px';
        btn.title = 'Gộp hex thành một dòng';
        btn.textContent = collapsedLabels.has(labelName) ? '▶' : '▼';
        btn.onclick = (e) => {
            e.stopPropagation();
            if (collapsedLabels.has(labelName)) collapsedLabels.delete(labelName);
            else collapsedLabels.add(labelName);
            renderDetailedHtml();
        };
        return btn;
    }

    function renderDetailedHtml() {
        const container = document.createElement('div');
        const dispItems = buildDisplayItems(currentItems);
        let i = 0;
        
        while (i < dispItems.length) {
            const d = dispItems[i];

            if (d.kind === 'label') {
                const it = d.item;
                const isDataOnly = isLabelDataOnly(currentItems, d.idx);
                const isCollapsed = collapsedLabels.has(it.label);

                const lineDiv = document.createElement('div');
                lineDiv.className = 'gadget-line';
                lineDiv.style.paddingLeft = '0';
                
                if (isDataOnly) lineDiv.appendChild(makeCollapseBtn(it.label, container, lineDiv));
                
                const labelSpan = document.createElement('span');
                labelSpan.className = 'label-name';
                labelSpan.textContent = `${it.label}:`;
                lineDiv.appendChild(labelSpan);
                
                // Nút Edit Label Inline
                const editBtn = document.createElement('button');
                editBtn.className = 'action-btn';
                editBtn.textContent = '✏️';
                editBtn.style.padding = '1px 4px';
                editBtn.onclick = (e) => {
                    e.stopPropagation();
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.value = it.label;
                    input.className = 'label-edit-input';
                    input.style.width = Math.max(100, it.label.length * 8) + 'px';
                    
                    input.onkeydown = (ev) => {
                        if (ev.key === 'Enter') {
                            ev.preventDefault();
                            let newName = input.value.trim();
                            if (/[\s\n]/.test(newName)) {
                                alert("Tên label không được chứa dấu cách hoặc xuống dòng!");
                                return;
                            }
                            if (newName && newName !== it.label) {
                                saveHistory();
                                let oldName = it.label;
                                
                                customLabels.set(it.addr, newName);
                                saveState();
                                
                                currentItems.forEach(item => {
                                    if (item.type === 'label' && item.label === oldName) item.label = newName;
                                    if (item.labelRef && item.labelRef.label === oldName) item.labelRef.label = newName;
                                });
                                if (window.currentLabelShifts[oldName] !== undefined) {
                                    window.currentLabelShifts[newName] = window.currentLabelShifts[oldName];
                                    delete window.currentLabelShifts[oldName];
                                }
                                if (collapsedLabels.has(oldName)) {
                                    collapsedLabels.delete(oldName);
                                    collapsedLabels.add(newName);
                                }
                            }
                            refreshOutput(); 
                        } else if (ev.key === 'Escape') {
                            refreshOutput(); 
                        }
                    };
                    
                    lineDiv.replaceChild(input, labelSpan);
                    lineDiv.removeChild(editBtn);
                    input.focus();
                };
                lineDiv.appendChild(editBtn);

                if (showAddrs) {
                    const locSpan = document.createElement('span');
                    locSpan.className = 'location';
                    locSpan.textContent = fmtAddr(it.addr);
                    lineDiv.appendChild(locSpan);
                }
                
                container.appendChild(lineDiv);

                if (isDataOnly && isCollapsed) {
                    const rawBytes = [];
                    let j = d.idx + 1;
                    while (j < currentItems.length && currentItems[j].type !== 'label') {
                        rawBytes.push(...currentItems[j].hexBytes);
                        j++;
                    }
                    const hexLine = document.createElement('div');
                    hexLine.className = 'gadget-line';
                    hexLine.style.paddingLeft = '16px';
                    
                    const badge = document.createElement('span');
                    badge.className = 'hex-badge';
                    badge.textContent = rawBytes.map(b => b.toString(16).padStart(2,'0')).join(' ');
                    hexLine.appendChild(badge);
                    
                    let mode = collapsedViewMode[it.label] || 'hex';
                    const valSpan = document.createElement('span');
                    valSpan.className = 'data-name';
                    if (mode === 'token') valSpan.textContent = formatAsToken(rawBytes);
                    else valSpan.textContent = 'hex ' + rawBytes.map(b => b.toString(16).padStart(2,'0')).join(' ');
                    hexLine.appendChild(valSpan);

                    const btnGroup = document.createElement('span');
                    btnGroup.style.marginLeft = 'auto';

                    const btnHex = document.createElement('button');
                    btnHex.className = mode === 'hex' ? 'action-btn active' : 'action-btn';
                    btnHex.textContent = 'Hex';
                    btnHex.onclick = () => { collapsedViewMode[it.label] = 'hex'; refreshOutput(); };

                    const btnToken = document.createElement('button');
                    btnToken.className = mode === 'token' ? 'action-btn active' : 'action-btn';
                    btnToken.textContent = 'Token';
                    btnToken.onclick = () => { collapsedViewMode[it.label] = 'token'; refreshOutput(); };

                    btnGroup.append(btnHex, btnToken);
                    hexLine.appendChild(btnGroup);

                    container.appendChild(hexLine);
                    i++;
                    while (i < dispItems.length && dispItems[i].kind !== 'label') i++;
                    continue;
                }
                i++;
                continue;
            }
            
            if (d.kind === 'popgroup') {
                const it = d.item;
                const lineDiv = document.createElement('div');
                lineDiv.className = 'gadget-line';
                lineDiv.style.paddingLeft = '16px';
                
                const badge = document.createElement('span');
                badge.className = 'hex-badge';
                badge.textContent = it.hexBytes.map(b => b.toString(16).padStart(2,'0')).join(' ');
                lineDiv.appendChild(badge);
                
                const valSpan = document.createElement('span');
                valSpan.className = 'data-name';
                valSpan.textContent = formatPopGroupAssignment(d.regs, d.consumedItems);
                lineDiv.appendChild(valSpan);
                
                const btnGroup = document.createElement('span');
                btnGroup.style.marginLeft = 'auto';
                
                const ungrpBtn = document.createElement('button');
                ungrpBtn.className = 'action-btn active';
                ungrpBtn.textContent = 'Ungroup';
                ungrpBtn.onclick = () => { saveHistory(); it.popGrouped = false; refreshOutput(); };
                btnGroup.appendChild(ungrpBtn);

                if (showAddrs && d.consumedItems && d.consumedItems.length > 0) {
                    const dataStartItem = d.consumedItems[0];
                    const dataEndItem = d.consumedItems[d.consumedItems.length - 1];
                    const locSpan = document.createElement('span');
                    locSpan.className = 'location';
                    locSpan.textContent = `(${fmtAddr(it.ramAddrDest)}->${fmtAddr(dataEndItem.ramAddrDest)}|${fmtAddr(it.ramAddrSrc)}->${fmtAddr(dataEndItem.ramAddrSrc)})`;
                    btnGroup.appendChild(locSpan);
                }
                
                lineDiv.appendChild(btnGroup);
                container.appendChild(lineDiv);
                i++; continue;
            }

            if (d.kind === 'call') {
                const it = d.item;
                const lineDiv = document.createElement('div');
                lineDiv.className = 'gadget-line';
                lineDiv.style.paddingLeft = '16px';
                
                const badge = document.createElement('span');
                badge.className = 'hex-badge';
                badge.textContent = it.hexBytes.map(b => b.toString(16).padStart(2,'0')).join(' ');
                lineDiv.appendChild(badge);
                
                const addrStr = it.addr.toString(16).toUpperCase().padStart(5, '0');
                const nameSpan = document.createElement('span');
                nameSpan.className = it.name ? 'gadget-name' : 'gadget-name-unknown';
                nameSpan.textContent = it.name ? it.name : `call ${addrStr}`;
                lineDiv.appendChild(nameSpan);

                const btnGroup = document.createElement('span');
                btnGroup.style.marginLeft = 'auto';

                if (!it.name) {
                    const hexBtn = document.createElement('button');
                    hexBtn.className = 'action-btn';
                    hexBtn.textContent = 'To Hex';
                    hexBtn.onclick = () => { saveHistory(); convertCallToHex(it); };
                    btnGroup.appendChild(hexBtn);
                } else if (autoGroupPop && isPurePopGadget(it.name) && !it.popGrouped) {
                    const grpBtn = document.createElement('button');
                    grpBtn.className = 'action-btn';
                    grpBtn.textContent = 'Group Pop';
                    grpBtn.onclick = () => { saveHistory(); it.popGrouped = true; refreshOutput(); };
                    btnGroup.appendChild(grpBtn);
                }

                if (showAddrs) {
                    const locSpan = document.createElement('span');
                    locSpan.className = 'location';
                    locSpan.textContent = `(${fmtAddr(it.ramAddrDest)}|${fmtAddr(it.ramAddrSrc)})`;
                    btnGroup.appendChild(locSpan);
                }
                
                lineDiv.appendChild(btnGroup);
                container.appendChild(lineDiv);
                i++; continue;
            }

            const it = d.item;
            const it2 = d.item2;
            const lineDiv = document.createElement('div');
            lineDiv.className = 'gadget-line';
            lineDiv.style.paddingLeft = '16px';

            const displayBytes = d.kind === 'data2' || d.kind === 'labelref' ? [...it.hexBytes, ...it2.hexBytes] : [...it.hexBytes];
            const badge = document.createElement('span');
            badge.className = 'hex-badge';
            badge.textContent = displayBytes.map(b => b.toString(16).padStart(2,'0')).join(' ');
            lineDiv.appendChild(badge);

            let display;
            let fakeItem;
            if (d.kind === 'labelref') {
                display = getDataDisplay(it); 
            } else if (d.kind === 'data2') {
                fakeItem = { hexBytes: displayBytes, value: (it2.value << 8) | it.value, labelRef: null, viewMode: it.viewMode };
                display = getDataDisplay(fakeItem);
            } else {
                display = getDataDisplay(it);
            }

            const valSpan = document.createElement('span');
            valSpan.className = 'data-name';
            valSpan.textContent = display;
            lineDiv.appendChild(valSpan);
            
            const btnGroup = document.createElement('span');
            btnGroup.style.marginLeft = 'auto';

            let targetItem = d.kind === 'data2' ? fakeItem : it;
            let isTranslatable = false;
            
            if (translateNames && targetItem.hexBytes && targetItem.hexBytes.length === 2 && valueToName.has(targetItem.value)) {
                isTranslatable = true;
            }
            if (labelMode && targetItem.labelRef) {
                isTranslatable = true;
            }

            if (isTranslatable) {
                const toggleFmtBtn = document.createElement('button');
                toggleFmtBtn.className = 'action-btn';
                toggleFmtBtn.textContent = (it.viewMode === 'hex') ? 'To Name/Label' : 'To Hex';
                toggleFmtBtn.onclick = () => {
                    saveHistory();
                    let newMode = (it.viewMode === 'hex') ? 'auto' : 'hex';
                    it.viewMode = newMode;
                    if(it2) it2.viewMode = newMode;
                    refreshOutput();
                };
                btnGroup.appendChild(toggleFmtBtn);
            }

                locSpan.className = 'location';
                locSpan.textContent = `(${fmtAddr(it.ramAddrDest)}|${fmtAddr(it.ramAddrSrc)})`;
                btnGroup.appendChild(locSpan);
            }
            
            lineDiv.appendChild(btnGroup);
            container.appendChild(lineDiv);
            i++;
        }
        outputListEl.innerHTML = '';
        outputListEl.appendChild(container);
    }

    function formatSimple() {
        const dispItems = buildDisplayItems(currentItems);
        const lines = [];
        const indentSpaces = parseInt(document.getElementById('indentInput').value) || 4;
        const indentStr = ' '.repeat(indentSpaces);

        lines.push(`org 0x${currentStartAddrDest.toString(16).toLowerCase()}`);

        let i = 0;
        while (i < dispItems.length) {
            const d = dispItems[i];
            if (d.kind === 'label') {
                const it = d.item;
                const isDataOnly = isLabelDataOnly(currentItems, d.idx);
                lines.push(`${it.label}:`);
                if (isDataOnly && collapsedLabels.has(it.label)) {
                    const rawBytes = [];
                    let j = d.idx + 1;
                    while (j < currentItems.length && currentItems[j].type !== 'label') {
                        rawBytes.push(...currentItems[j].hexBytes);
                        j++;
                    }
                    let mode = collapsedViewMode[it.label] || 'hex';
                    if (mode === 'token') {
                        const tokenStrs = formatAsToken(rawBytes).split('\n');
                        tokenStrs.forEach(s => lines.push(indentStr + s));
                    } else {
                        lines.push(indentStr + 'hex ' + rawBytes.map(b => b.toString(16).padStart(2,'0')).join(' '));
                    }
                    i++;
                    while (i < dispItems.length && dispItems[i].kind !== 'label') i++;
                    continue;
                }
            } else if (d.kind === 'popgroup') {
                lines.push(indentStr + formatPopGroupAssignment(d.regs, d.consumedItems));
            } else if (d.kind === 'call') {
                const it = d.item;
                lines.push(indentStr + (it.name ? it.name : `call ${it.addr.toString(16).toUpperCase().padStart(5,'0')}`));
            } else if (d.kind === 'labelref') {
                lines.push(indentStr + getDataDisplay(d.item));
            } else if (d.kind === 'data2') {
                const displayBytes = [...d.item.hexBytes, ...d.item2.hexBytes];
                const fakeItem = { hexBytes: displayBytes, value: (d.item2.value << 8) | d.item.value, labelRef: null, viewMode: d.item.viewMode };
                lines.push(indentStr + getDataDisplay(fakeItem));
            } else { 
                lines.push(indentStr + getDataDisplay(d.item));
            }
            i++;
        }
        return lines.join('\n');
    }

    function refreshOutput() {
        if (!currentItems.length) {
            outputListEl.innerHTML = '<div style="color:var(--text-muted); padding:12px;">// No data. Enter hex and press DECOMPILE.</div>';
            updateStats(0, []);
            return;
        }
        if (currentMode === "detail") {
            renderDetailedHtml();
        } else {
            outputListEl.innerText = formatSimple();
        }
        updateStats(currentByteCount, currentItems);
    }

    function decompileAndSet() {
        let rawHex = document.getElementById('hexInput').value.trim();
        saveState(); 
        if (!rawHex) {
            currentItems = [];
            currentByteCount = 0;
            outputListEl.innerHTML = '<div style="color:var(--text-muted); padding:12px;">// Please enter hex program</div>';
            updateStats(0, []);
            setStatus("⚠️ No hex input", true);
            return;
        }
        let startAddrDest = parseInt(document.getElementById('startAddrInput').value.trim().toLowerCase(), 16);
        if (isNaN(startAddrDest)) startAddrDest = 0xd730;
        let startAddrSrc = parseInt(document.getElementById('backupAddrInput').value.trim().toLowerCase(), 16);
        if (isNaN(startAddrSrc)) startAddrSrc = 0xe9e0;
        
        currentStartAddrDest = startAddrDest;
        currentStartAddrSrc = startAddrSrc;
        setStatus("⏳ Decompiling...");
        
        historyStack = [];
        undoBtn.style.display = 'none';

        setTimeout(() => {
            try {
                let bytes = hexToBytes(rawHex);
                if (!bytes.length) throw new Error("Invalid hex bytes");
                currentByteCount = bytes.length;
                let items = parseToItems(bytes, startAddrDest, startAddrSrc);
                items = addLabelReferences(items);
                items = resequenceLabels(items);
                currentItems = items;
                refreshOutput();
                setStatus("✅ Decompiled successfully");
            } catch (e) {
                currentItems = [];
                currentByteCount = 0;
                outputListEl.innerHTML = `<div style="color:#d32f2f; padding:12px;">// Error: ${e.message}</div>`;
                updateStats(0, []);
                setStatus("❌ Decompile error", true);
            }
        }, 10);
    }

    document.getElementById('decompileBtn').onclick = decompileAndSet;
    document.getElementById('clearBtn').onclick = () => {
        document.getElementById('hexInput').value = "";
        currentItems = [];
        historyStack = [];
        undoBtn.style.display = 'none';
        currentByteCount = 0;
        outputListEl.innerHTML = '<div style="color:var(--text-muted); padding:12px;">// Press DECOMPILE</div>';
        updateStats(0, []);
        saveState();
        setStatus("🧹 Cleared");
    };
    document.getElementById('copyBtn').onclick = () => {
        let txt = currentMode === "detail" ? formatSimple() : outputListEl.innerText;
        if (!txt || txt.includes("// Press DECOMPILE") || txt.includes("// No data")) {
            setStatus("⚠️ Nothing to copy", true);
            return;
        }
        navigator.clipboard.writeText(txt).then(() => setStatus("📋 Copied output")).catch(() => setStatus("❌ Copy failed", true));
    };
    document.getElementById('pasteBtn').onclick = async () => {
        try {
            let text = await navigator.clipboard.readText();
            document.getElementById('hexInput').value = text;
            saveState();
            setStatus("📌 Pasted from clipboard");
        } catch { setStatus("⚠️ Cannot read clipboard", true); }
    };

    function setActiveMode(mode) {
        currentMode = mode;
        if (mode === "detail") {
            document.getElementById('modeDetailBtn').classList.add('active');
            document.getElementById('modeSimpleBtn').classList.remove('active');
        } else {
            document.getElementById('modeSimpleBtn').classList.add('active');
            document.getElementById('modeDetailBtn').classList.remove('active');
        }
        refreshOutput();
        setStatus(`🔁 Switched to ${mode === "detail" ? "Detailed" : "Simple"} mode`);
    }
    document.getElementById('modeDetailBtn').onclick = () => setActiveMode("detail");
    document.getElementById('modeSimpleBtn').onclick = () => setActiveMode("simple");

    function setPill(pill, on) { pill.classList.toggle('on', on); }
    const pillLabels   = document.getElementById('pillLabels');
    const pillAutoPopData = document.getElementById('pillAutoPopData');
    const pillAutoPop  = document.getElementById('pillAutoPop');
    const pillNames    = document.getElementById('pillNames');
    const pillAddrs    = document.getElementById('pillAddrs');
    const pillHexMode  = document.getElementById('pillHexMode');
    const pillTheme    = document.getElementById('pillTheme');

    document.getElementById('settingLabels').onclick = () => {
        labelMode = !labelMode; setPill(pillLabels, labelMode); 
        
        saveState(); decompileAndSet();
        setStatus(labelMode ? "🏷️ Labels ON" : "🏷️ Labels OFF");
    };
    document.getElementById('settingAutoPopData').onclick = () => {
        autoPopData = !autoPopData; setPill(pillAutoPopData, autoPopData); 
        saveState(); decompileAndSet();
        setStatus(autoPopData ? "📥 Auto Parse POP Data ON" : "📥 Auto Parse POP Data OFF");
    };
    document.getElementById('settingAutoPop').onclick = () => {
        autoGroupPop = !autoGroupPop; setPill(pillAutoPop, autoGroupPop); 
        currentItems.forEach(it => {
            if (it.type === 'call' && isPurePopGadget(it.name)) {
                it.popGrouped = autoGroupPop;
            }
        });
        saveState(); refreshOutput();
        setStatus(autoGroupPop ? "📦 Auto POP ON" : "📦 Auto POP OFF");
    };
    document.getElementById('settingNames').onclick = () => {
        translateNames = !translateNames; setPill(pillNames, translateNames); 
        saveState(); refreshOutput();
        setStatus(translateNames ? "🗂️ Translate Names ON" : "🗂️ Translate Names OFF");
    };
    document.getElementById('settingAddrs').onclick = () => {
        showAddrs = !showAddrs; setPill(pillAddrs, showAddrs); 
        saveState(); refreshOutput();
        setStatus(showAddrs ? "📍 Addresses ON" : "📍 Addresses OFF");
    };
    document.getElementById('settingHexMode').onclick = () => {
        hexMode = hexMode === 'hex' ? '0x' : 'hex'; setPill(pillHexMode, hexMode === '0x'); 
        document.getElementById('hexModeLabel').style.color = hexMode === 'hex' ? 'var(--accent)' : 'var(--text-muted)';
        document.getElementById('hexModeLabel2').style.color = hexMode === '0x' ? 'var(--accent)' : 'var(--text-muted)';
        saveState(); refreshOutput();
        setStatus(`🔢 Format: ${hexMode}`);
    };
    document.getElementById('settingTheme').onclick = (e) => {
        if(e.target.tagName === 'INPUT') return;
        isNatureTheme = !isNatureTheme; setPill(pillTheme, isNatureTheme);
        document.body.className = isNatureTheme ? 'theme-nature' : 'theme-minimal';
        saveState();
        setStatus(isNatureTheme ? "🌸 Nature Theme ON" : "🌙 Minimal Theme ON");
    };

    document.getElementById('indentInput').addEventListener('input', () => { 
        saveState(); refreshOutput(); 
    });
    document.getElementById('hexInput').addEventListener('input', saveState);
    document.getElementById('startAddrInput').addEventListener('input', saveState);
    document.getElementById('backupAddrInput').addEventListener('input', saveState);

    const settingsBtn = document.getElementById('settingsBtn');
    const settingsDropdown = document.getElementById('settingsDropdown');
    
    settingsBtn.onclick = (e) => { 
        e.stopPropagation(); 
        settingsDropdown.classList.toggle('show'); 
    };
    document.addEventListener('click', () => settingsDropdown.classList.remove('show'));
    settingsDropdown.addEventListener('click', e => e.stopPropagation());

    // --------------------------------------------------------------
    // KHỞI TẠO TỪ LOCALSTORAGE
    // --------------------------------------------------------------
    document.body.className = isNatureTheme ? 'theme-nature' : 'theme-minimal';
    setPill(pillTheme, isNatureTheme);
    setPill(pillLabels, labelMode);
    setPill(pillAutoPopData, autoPopData);
    setPill(pillAutoPop, autoGroupPop);
    setPill(pillNames, translateNames);
    setPill(pillAddrs, showAddrs);
    setPill(pillHexMode, hexMode === '0x');
    
    document.getElementById('hexModeLabel').style.color = hexMode === 'hex' ? 'var(--accent)' : 'var(--text-muted)';
    document.getElementById('hexModeLabel2').style.color = hexMode === '0x' ? 'var(--accent)' : 'var(--text-muted)';

    document.getElementById('hexInput').value = localStorage.getItem('hexInput') || '';
    document.getElementById('startAddrInput').value = localStorage.getItem('startAddr') || 'd730';
    document.getElementById('backupAddrInput').value = localStorage.getItem('backupAddr') || 'e9e0';
    document.getElementById('indentInput').value = localStorage.getItem('indentStr') || '4';

    if (document.getElementById('hexInput').value.trim() !== '') {
        decompileAndSet();
    } else {
        outputListEl.innerHTML = '<div style="color:var(--text-muted); padding:12px;">// Press DECOMPILE</div>';
    }

</script>
